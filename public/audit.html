<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GAIN — Audit Log</title>
  <script>(function(){try{var p=localStorage.getItem('gain.theme.palette')||'classic';var m=localStorage.getItem('gain.theme.mode')||'light';document.documentElement.setAttribute('data-palette',p);document.documentElement.setAttribute('data-mode',m);}catch(e){}})();</script>
  <link rel="stylesheet" href="/css/gain-theme.css?v=43" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body>

  <div data-site-header></div>

  <main class="app-shell" id="main-content" tabindex="-1">

    <div class="flex-between">
      <div>
        <h1 class="page-title">Audit Log</h1>
        <p class="page-lead">
          An append-only record of every governance action taken in this workspace.
          Entries are written by editors and cannot be modified or deleted.
          Satisfies NIST AI RMF GOVERN 1.7 and ISO 42001 A.9.1.
        </p>
      </div>
      <div class="btn-row" style="margin:0;gap:8px">
        <button class="btn btn-ghost btn-sm" id="export-btn">Export CSV</button>
        <button class="btn btn-ghost btn-sm" id="export-json-btn">Export JSON</button>
      </div>
    </div>

    <div class="card">
      <div class="flex-between" style="margin-bottom:12px;flex-wrap:wrap;gap:8px">
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <select id="filter-action" class="btn btn-ghost btn-sm" style="min-width:160px">
            <option value="">All actions</option>
            <option value="aia">AIAs</option>
            <option value="intake">Intake</option>
            <option value="inventory">Inventory</option>
            <option value="risk">Risks</option>
            <option value="policy">Policies</option>
            <option value="incident">Incidents</option>
            <option value="contract">Contracts</option>
            <option value="training">Training</option>
            <option value="consent">Consent</option>
            <option value="disclosure">Disclosures</option>
            <option value="team">Team</option>
            <option value="member">Members</option>
            <option value="checklist">Checklists</option>
          </select>
          <input id="filter-actor" type="search" placeholder="Filter by actor…" style="font-size:.85rem;padding:4px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);min-width:180px" />
        </div>
        <span id="row-count" class="text-muted" style="font-size:.85rem"></span>
      </div>

      <table class="data" id="audit-table">
        <thead>
          <tr>
            <th style="min-width:140px">Date / Time</th>
            <th>Actor</th>
            <th>Action</th>
            <th>Target</th>
            <th>Details</th>
          </tr>
        </thead>
        <tbody id="audit-tbody">
          <tr><td colspan="5" class="empty-state">Loading…</td></tr>
        </tbody>
      </table>

      <div id="load-more-wrap" style="text-align:center;margin-top:12px;display:none">
        <button class="btn btn-ghost btn-sm" id="load-more-btn">Load more</button>
      </div>
    </div>

    <div data-site-footer></div>
  </main>

  <script type="module">
    import { requireCompany } from '/js/session.js?v=43';
    import { renderHeader, renderFooter, escapeHTML, formatDateTime } from '/js/ui.js?v=45';
    import { db } from '/js/config.js?v=43';
    import {
      collection, query, orderBy, limit, startAfter, getDocs
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    const { user, memberships, company } = await requireCompany();
    renderHeader({ user, company, memberships });
    renderFooter();

    const PAGE = 100;
    let allRows = [];       // all fetched rows
    let filtered = [];      // after filter
    let lastDoc = null;
    let hasMore = false;

    async function fetchPage(after = null) {
      const constraints = [orderBy('at', 'desc'), limit(PAGE + 1)];
      if (after) constraints.push(startAfter(after));
      const q = query(
        collection(db, 'companies', company.id, 'audit'),
        ...constraints
      );
      const snap = await getDocs(q);
      hasMore = snap.docs.length > PAGE;
      const docs = snap.docs.slice(0, PAGE);
      if (docs.length) lastDoc = docs[docs.length - 1];
      return docs.map(d => ({ id: d.id, ...d.data() }));
    }

    function applyFilters() {
      const actionFilter = document.getElementById('filter-action').value.toLowerCase();
      const actorFilter  = document.getElementById('filter-actor').value.toLowerCase();
      filtered = allRows.filter(r => {
        const action = (r.action || '').toLowerCase();
        const actor  = (r.actorName || '').toLowerCase();
        if (actionFilter && !action.startsWith(actionFilter)) return false;
        if (actorFilter  && !actor.includes(actorFilter))     return false;
        return true;
      });
      renderTable();
    }

    function renderTable() {
      const tbody = document.getElementById('audit-tbody');
      document.getElementById('row-count').textContent = `${filtered.length} event${filtered.length === 1 ? '' : 's'}`;
      if (!filtered.length) {
        tbody.innerHTML = `<tr><td colspan="5" class="empty-state">No events match the current filter.</td></tr>`;
        return;
      }
      tbody.innerHTML = filtered.map(r => {
        const details = r.details && Object.keys(r.details).length
          ? Object.entries(r.details).map(([k, v]) => `<span class="text-muted" style="font-size:.78rem">${escapeHTML(k)}: ${escapeHTML(String(v))}</span>`).join(' · ')
          : '';
        return `
          <tr>
            <td style="font-size:.82rem;white-space:nowrap">${escapeHTML(formatDateTime(r.at))}</td>
            <td>${escapeHTML(r.actorName || r.actorUid || '—')}</td>
            <td><code style="font-size:.82rem">${escapeHTML(r.action || '—')}</code></td>
            <td style="font-size:.82rem;font-family:monospace;word-break:break-all">${escapeHTML(r.target || '—')}</td>
            <td style="font-size:.82rem">${details}</td>
          </tr>
        `;
      }).join('');

      document.getElementById('load-more-wrap').style.display = hasMore ? '' : 'none';
    }

    // Initial load
    allRows = await fetchPage();
    filtered = allRows;
    renderTable();

    document.getElementById('load-more-btn').addEventListener('click', async () => {
      const more = await fetchPage(lastDoc);
      allRows = [...allRows, ...more];
      applyFilters();
    });

    document.getElementById('filter-action').addEventListener('change', applyFilters);
    document.getElementById('filter-actor').addEventListener('input', applyFilters);

    function isoTs(ts) {
      if (!ts) return '';
      if (ts.toDate) return ts.toDate().toISOString();
      const d = new Date(ts);
      return isNaN(d) ? '' : d.toISOString();
    }

    function downloadBlob(name, type, content) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = name; a.click();
      URL.revokeObjectURL(url);
    }

    // CSV export
    document.getElementById('export-btn').addEventListener('click', () => {
      const header = ['Date/Time (UTC)', 'Actor', 'Actor UID', 'Action', 'Target', 'Details'];
      const rows = filtered.map(r => [
        isoTs(r.at),
        r.actorName || '',
        r.actorUid || '',
        r.action || '',
        r.target || '',
        r.details ? JSON.stringify(r.details) : ''
      ].map(v => `"${String(v).replace(/"/g, '""')}"`).join(','));
      const csv = [header.join(','), ...rows].join('\n');
      downloadBlob(`audit-log-${company.id}-${new Date().toISOString().slice(0,10)}.csv`, 'text/csv', csv);
    });

    // JSON export
    document.getElementById('export-json-btn').addEventListener('click', () => {
      const clean = filtered.map(r => ({ ...r, at: isoTs(r.at) }));
      const json = JSON.stringify({
        companyId: company.id,
        companyName: company.name || null,
        exportedAt: new Date().toISOString(),
        count: clean.length,
        events: clean,
      }, null, 2);
      downloadBlob(`audit-log-${company.id}-${new Date().toISOString().slice(0,10)}.json`, 'application/json', json);
    });
  </script>

</body>
</html>
