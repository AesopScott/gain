<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <rect width="1200" height="630" fill="#F7F8FA"/>
  <rect x="40" y="40" width="1120" height="550" rx="20" fill="#FFFFFF" stroke="#D8DEE8" stroke-width="2"/>

  <!-- Header row: logo + URL -->
  <g transform="translate(80,80)">
    <circle cx="30" cy="30" r="28" fill="#1F3864"/>
    <circle cx="30" cy="30" r="28" fill="none" stroke="#4FB3D9" stroke-width="2"/>
    <text x="30" y="42" font-family="-apple-system,Segoe UI,Arial,sans-serif" font-weight="800" font-size="34" text-anchor="middle" fill="#FFFFFF">G</text>
    <text x="75" y="42" font-family="-apple-system,Segoe UI,Arial,sans-serif" font-weight="800" font-size="32" fill="#1F3864" letter-spacing="2">GAIN</text>
  </g>
  <text x="1120" y="122" font-family="-apple-system,Segoe UI,Arial,sans-serif" font-weight="500" font-size="20" text-anchor="end" fill="#7A8599">GovernAINow.com</text>

  <!-- Title -->
  <text x="80" y="280" font-family="-apple-system,Segoe UI,Arial,sans-serif" font-weight="800" font-size="72" fill="#1A2434">AI governance,</text>
  <text x="80" y="360" font-family="-apple-system,Segoe UI,Arial,sans-serif" font-weight="800" font-size="72" fill="#2E75B6">from intake to audit.</text>

  <!-- Feature chips -->
  <g font-family="-apple-system,Segoe UI,Arial,sans-serif" font-weight="600" font-size="22" fill="#1F3864">
    <g transform="translate(80,430)">
      <rect width="220" height="56" rx="28" fill="#EEF2F7"/>
      <text x="110" y="36" text-anchor="middle">AI System Inventory</text>
    </g>
    <g transform="translate(316,430)">
      <rect width="180" height="56" rx="28" fill="#EEF2F7"/>
      <text x="90" y="36" text-anchor="middle">Risk Register</text>
    </g>
    <g transform="translate(512,430)">
      <rect width="260" height="56" rx="28" fill="#EEF2F7"/>
      <text x="130" y="36" text-anchor="middle">Impact Assessments</text>
    </g>
    <g transform="translate(788,430)">
      <rect width="220" height="56" rx="28" fill="#EEF2F7"/>
      <text x="110" y="36" text-anchor="middle">NIST · ISO · EU AI Act</text>
    </g>
  </g>

  <!-- Accent bar -->
  <rect x="80" y="540" width="80" height="5" fill="#4FB3D9"/>
</svg>
