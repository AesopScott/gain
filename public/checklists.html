<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GAIN — Checklists</title>
  <script>(function(){try{var p=localStorage.getItem('gain.theme.palette')||'classic';var m=localStorage.getItem('gain.theme.mode')||'light';document.documentElement.setAttribute('data-palette',p);document.documentElement.setAttribute('data-mode',m);}catch(e){}})();</script>
  <link rel="stylesheet" href="/css/gain-theme.css?v=15" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body>

  <div data-site-header></div>

  <main class="app-shell">

    <h1 class="page-title">Checklists</h1>
    <p class="page-lead">
      Working checklists that turn framework requirements into line-item to-dos.
      <strong>NIST AI RMF 1.0</strong> is always on. Additional checklists appear automatically
      when the matching sector or regulated data type is selected on your
      <a href="/framework.html">Regulatory Posture</a> page.
    </p>

    <div id="checklist-index" class="checklist-index"></div>
    <div id="checklist-views"></div>

    <div data-site-footer></div>
  </main>

  <script type="module">
    import { requireCompany, canEdit } from '/js/session.js?v=20';
    import { renderHeader, renderFooter, toast, escapeHTML } from '/js/ui.js?v=21';
    import { getPosture } from '/js/data.js?v=15';
    import { CHECKLISTS, applicableChecklists, checklistStats } from '/js/checklists.js?v=15';
    import { db } from '/js/config.js?v=15';
    import { doc, getDoc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    const { user, memberships, company, member } = await requireCompany();
    renderHeader({ user, company, memberships });
    renderFooter();

    const editorOK = canEdit(member);

    const posture = await getPosture(company.id);

    // Load all progress docs in parallel. allSettled so a single Firestore
    // read failure doesn't blank the whole page — NIST always renders.
    const allLists = applicableChecklists(posture);
    const applicable = allLists.filter(cl => cl.applicable);
    const progress = {};
    await Promise.allSettled(applicable.map(async cl => {
      const snap = await getDoc(doc(db, 'companies', company.id, 'checklists', cl.key));
      progress[cl.key] = snap.exists() ? snap.data() : { items: {} };
    }));

    renderIndex();
    renderLists();

    function renderIndex() {
      const applicableList = allLists.filter(cl => cl.applicable);
      const dormantList = allLists.filter(cl => !cl.applicable);

      const indexHTML = `
        <div class="card">
          <h2 class="card-title">Active checklists (${applicableList.length})</h2>
          <div class="checklist-cards">
            ${applicableList.map(cl => {
              const s = checklistStats(cl, progress[cl.key]);
              return `
                <a href="#${cl.key}" class="checklist-card-link">
                  <div class="checklist-card">
                    <div class="checklist-card-head">
                      <span class="checklist-card-tag checklist-card-tag-${cl.always ? 'primary' : 'sector'}">${escapeHTML(cl.tag)}</span>
                      <span class="checklist-card-progress">${s.done} / ${s.total}</span>
                    </div>
                    <div class="checklist-card-name">${escapeHTML(cl.name)}</div>
                    <div class="checklist-progress-bar"><div style="width:${s.pct}%"></div></div>
                    <div class="text-muted" style="font-size:.8rem;margin-top:6px">${escapeHTML(cl.description)}</div>
                  </div>
                </a>
              `;
            }).join('')}
          </div>
        </div>
        ${dormantList.length ? `
          <div class="card" style="margin-top:16px;opacity:.75">
            <h2 class="card-title">Select on <a href="/framework.html">Regulatory Posture</a> to activate</h2>
            <ul class="checklist-dormant-list">
              ${dormantList.map(cl => `<li><strong>${escapeHTML(cl.name)}</strong> <span class="text-muted">— ${escapeHTML(cl.description)}</span></li>`).join('')}
            </ul>
          </div>
        ` : ''}
      `;
      document.getElementById('checklist-index').innerHTML = indexHTML;
    }

    function renderLists() {
      const container = document.getElementById('checklist-views');
      container.innerHTML = applicable.map(cl => renderListHTML(cl)).join('');
      // Wire up checkboxes per list.
      for (const cl of applicable) {
        wireList(cl);
      }
    }

    function renderListHTML(cl) {
      const prog = progress[cl.key];
      const stats = checklistStats(cl, prog);
      return `
        <section id="${escapeHTML(cl.key)}" class="card checklist-section">
          <div class="flex-between">
            <div>
              <h2 class="card-title" style="margin-bottom:4px">${escapeHTML(cl.name)}</h2>
              <p class="text-muted" style="margin:0">${escapeHTML(cl.description)}</p>
            </div>
            <div style="text-align:right">
              <div class="checklist-card-progress" style="font-size:1.1rem">${stats.done} / ${stats.total}</div>
              <div class="checklist-progress-bar" style="width:150px"><div style="width:${stats.pct}%"></div></div>
            </div>
          </div>
          ${cl.sections.map(sec => `
            <h3 class="aia-section">${escapeHTML(sec.name)}</h3>
            <ul class="checklist-items" data-list="${escapeHTML(cl.key)}">
              ${sec.items.map(it => {
                const s = prog?.items?.[it.id] || {};
                return `
                  <li class="checklist-item-row${s.checked ? ' done' : ''}">
                    <label class="checklist-item-label">
                      <input type="checkbox" data-item="${escapeHTML(it.id)}" data-key="${escapeHTML(cl.key)}" ${s.checked ? 'checked' : ''} ${editorOK ? '' : 'disabled'} />
                      <span>${escapeHTML(it.text)}${it.ref ? ` <span class="text-muted" style="font-size:.78rem">(${escapeHTML(it.ref)})</span>` : ''}</span>
                    </label>
                    ${s.checked && s.checkedByName ? `<div class="checklist-meta text-muted">✓ ${escapeHTML(s.checkedByName)}</div>` : ''}
                  </li>
                `;
              }).join('')}
            </ul>
          `).join('')}
        </section>
      `;
    }

    function wireList(cl) {
      const section = document.getElementById(cl.key);
      section.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        cb.addEventListener('change', async () => {
          if (!editorOK) return;
          const itemId = cb.dataset.item;
          const key = cb.dataset.key;
          const checked = cb.checked;
          const items = { ...(progress[key].items || {}) };
          if (checked) {
            items[itemId] = {
              checked: true,
              checkedBy: user.uid,
              checkedByName: user.displayName || user.email,
              checkedAt: new Date().toISOString()
            };
          } else {
            items[itemId] = { checked: false };
          }
          progress[key] = { items };

          try {
            await setDoc(doc(db, 'companies', company.id, 'checklists', key), {
              items,
              updatedAt: serverTimestamp(),
              updatedBy: user.uid
            }, { merge: true });

            // Refresh counts in this section and index card.
            cb.closest('.checklist-item-row')?.classList.toggle('done', checked);
            const stats = checklistStats(cl, progress[key]);
            section.querySelector('.checklist-card-progress').textContent = `${stats.done} / ${stats.total}`;
            section.querySelector('.checklist-progress-bar > div').style.width = `${stats.pct}%`;
            renderIndex();
          } catch (err) {
            cb.checked = !checked;
            toast(err.message, 'error', 5000);
          }
        });
      });
    }
  </script>

</body>
</html>
