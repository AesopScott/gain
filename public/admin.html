<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GAIN — Super Admin</title>
  <script>(function(){try{var p=localStorage.getItem('gain.theme.palette')||'classic';var m=localStorage.getItem('gain.theme.mode')||'light';document.documentElement.setAttribute('data-palette',p);document.documentElement.setAttribute('data-mode',m);}catch(e){}})();</script>
  <link rel="stylesheet" href="/css/gain-theme.css?v=26" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body>

  <div data-site-header></div>

  <main class="app-shell">

    <div class="flex-between">
      <h1 class="page-title">Super Admin</h1>
      <span class="badge badge-high" style="font-size:.78rem">Platform-wide access</span>
    </div>

    <p class="page-lead">
      Every company in the platform, with its members and asset counts.
      Visible only to the designated super admin account.
    </p>

    <div id="admin-stats" class="grid-3 section-sep"></div>

    <div class="card section-sep">
      <h2 class="card-title">Companies</h2>
      <p class="text-muted" id="admin-loading">Loading all companies and asset counts…</p>
      <table class="data" id="admin-table" style="display:none">
        <thead>
          <tr>
            <th>Company</th>
            <th>Industry</th>
            <th>Size</th>
            <th>Members</th>
            <th>Inventory</th>
            <th>Risks</th>
            <th>AIAs</th>
            <th>Intake</th>
            <th>Policies</th>
            <th>Created</th>
          </tr>
        </thead>
        <tbody id="admin-rows"></tbody>
      </table>
    </div>

    <div id="admin-company-detail"></div>

    <div data-site-footer></div>
  </main>

  <script type="module">
    import { requireAuth, isSuperadmin, SUPERADMIN_EMAIL } from '/js/session.js?v=35';
    import { renderHeader, renderFooter, toast, escapeHTML, formatDate } from '/js/ui.js?v=26';
    import { listAllCompanies, listDocs, listMembers } from '/js/data.js?v=26';

    const { user, memberships } = await requireAuth();
    renderHeader({ user, company: null, memberships });
    renderFooter();

    if (!isSuperadmin(user)) {
      document.querySelector('main').innerHTML = `
        <div class="card card-hero">
          <h1 class="page-title">Access denied</h1>
          <p>This page is restricted to the designated super admin account (<code>${escapeHTML(SUPERADMIN_EMAIL)}</code>).</p>
          <p><a class="btn btn-primary" href="/dashboard.html">Back to dashboard</a></p>
        </div>
      `;
      throw new Error('not superadmin');
    }

    const loading = document.getElementById('admin-loading');
    let companies = [];
    try {
      companies = await listAllCompanies();
    } catch (err) {
      loading.textContent = 'Failed to load companies: ' + err.message;
      loading.style.color = 'var(--risk-high)';
      throw err;
    }

    if (companies.length === 0) {
      loading.textContent = 'No companies in the platform yet.';
    }

    // Fetch asset counts for each company in parallel.
    const details = await Promise.all(companies.map(async c => {
      const results = await Promise.allSettled([
        listMembers(c.id),
        listDocs(c.id, 'inventory'),
        listDocs(c.id, 'risks'),
        listDocs(c.id, 'aias'),
        listDocs(c.id, 'intake'),
        listDocs(c.id, 'policies')
      ]);
      const unwrap = (r, fallback) => r.status === 'fulfilled' ? r.value : fallback;
      return {
        company: c,
        members: unwrap(results[0], []),
        inventory: unwrap(results[1], []),
        risks: unwrap(results[2], []),
        aias: unwrap(results[3], []),
        intake: unwrap(results[4], []),
        policies: unwrap(results[5], []),
      };
    }));

    // Aggregate stats.
    const totalCompanies = details.length;
    const totalUsers = new Set(details.flatMap(d => d.members.map(m => m.id))).size;
    const totalSystems = details.reduce((s, d) => s + d.inventory.length, 0);

    document.getElementById('admin-stats').innerHTML = `
      <div class="card stat"><div class="stat-label">Companies</div><div class="stat-value">${totalCompanies}</div></div>
      <div class="card stat"><div class="stat-label">Unique users</div><div class="stat-value">${totalUsers}</div></div>
      <div class="card stat"><div class="stat-label">AI systems (all companies)</div><div class="stat-value">${totalSystems}</div></div>
    `;

    document.getElementById('admin-loading').style.display = 'none';
    document.getElementById('admin-table').style.display = '';
    const tbody = document.getElementById('admin-rows');
    tbody.innerHTML = details.map(d => `
      <tr>
        <td><a href="#" data-expand="${escapeHTML(d.company.id)}">${escapeHTML(d.company.name || '(unnamed)')}</a></td>
        <td>${escapeHTML(d.company.industry || '—')}</td>
        <td>${escapeHTML(d.company.size || '—')}</td>
        <td>${d.members.length}</td>
        <td>${d.inventory.length}</td>
        <td>${d.risks.length}</td>
        <td>${d.aias.length}</td>
        <td>${d.intake.length}</td>
        <td>${d.policies.length}</td>
        <td class="text-muted" style="font-size:.85rem">${formatDate(d.company.createdAt)}</td>
      </tr>
    `).join('');

    tbody.querySelectorAll('[data-expand]').forEach(a => {
      a.addEventListener('click', (e) => {
        e.preventDefault();
        const id = a.dataset.expand;
        renderCompanyDetail(details.find(d => d.company.id === id));
      });
    });

    function renderCompanyDetail(d) {
      const panel = document.getElementById('admin-company-detail');
      panel.innerHTML = `
        <div class="card section-sep">
          <div class="flex-between">
            <h2 class="card-title">${escapeHTML(d.company.name || '(unnamed)')} — members</h2>
            <button class="btn btn-ghost btn-sm" data-close-detail>Close</button>
          </div>
          <table class="data">
            <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Joined</th></tr></thead>
            <tbody>
              ${d.members.length === 0 ? '<tr><td colspan="4" class="empty-state">No members.</td></tr>' : d.members.map(m => `
                <tr>
                  <td>${escapeHTML(m.displayName || '')}</td>
                  <td>${escapeHTML(m.email || '')}</td>
                  <td><span class="status-pill">${escapeHTML(m.role || '')}</span></td>
                  <td class="text-muted" style="font-size:.85rem">${formatDate(m.joinedAt)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
      panel.querySelector('[data-close-detail]').addEventListener('click', () => { panel.innerHTML = ''; });
      panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  </script>

</body>
</html>
