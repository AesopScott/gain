<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GAIN — AI Use Case Intake</title>
  <script>(function(){try{var p=localStorage.getItem('gain.theme.palette')||'classic';var m=localStorage.getItem('gain.theme.mode')||'light';document.documentElement.setAttribute('data-palette',p);document.documentElement.setAttribute('data-mode',m);}catch(e){}})();</script>
  <link rel="stylesheet" href="/css/gain-theme.css?v=47" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="description" content="AI governance — from intake to audit. NIST AI RMF · ISO 42001 · EU AI Act." />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="GAIN — AI Use Case Intake" />
  <meta property="og:description" content="AI governance — from intake to audit. NIST AI RMF · ISO 42001 · EU AI Act." />
  <meta property="og:image" content="https://governainow.com/og-images/11-badge-statement.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:url" content="https://governainow.com/" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="GAIN — AI Use Case Intake" />
  <meta name="twitter:description" content="AI governance — from intake to audit. NIST AI RMF · ISO 42001 · EU AI Act." />
  <meta name="twitter:image" content="https://governainow.com/og-images/11-badge-statement.png" />
</head>
<body>

  <div data-site-header></div>

  <main class="app-shell" id="main-content" tabindex="-1">

    <div class="flex-between">
      <h1 class="page-title">AI Use Case Intake</h1>
      <button class="btn btn-primary" data-new-intake data-editor-only>+ New intake request</button>
    </div>

    <p class="page-lead">
      Every new AI use case — whether building, buying, or enabling a vendor feature —
      starts here. This is the <strong>MAP</strong> function entry point: context is
      established, intended purpose documented, and the request triaged to AIA or declined.
    </p>

    <div class="card">
      <div class="filter-row">
        <label>Status:</label>
        <select data-filter-status>
          <option value="">All</option>
          <option value="submitted">Submitted</option>
          <option value="triage">In triage</option>
          <option value="review">In review</option>
          <option value="approved">Approved</option>
          <option value="rejected">Rejected</option>
          <option value="withdrawn">Withdrawn</option>
        </select>
      </div>
      <div data-sample-banner></div>
      <table class="data">
        <thead>
          <tr>
            <th>Title</th>
            <th>Requester</th>
            <th>Dept</th>
            <th>Submitted</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody data-intake-rows></tbody>
      </table>
    </div>

    <div data-site-footer></div>
  </main>

  <script type="module">
    import { requireCompany, canEdit, canAdmin } from '/js/session.js?v=47';
    import '/js/tour.js?v=47';
    import { renderHeader, renderFooter, toast, openModal, confirmDialog, serializeForm, setFormValues, escapeHTML, formatDate } from '/js/ui.js?v=47';
    import { listDocs, createRecord, updateRecord, deleteRecord, getRecord, logEvent, getPosture } from '/js/data.js?v=47';
    import { derivedIntakeExtras, derivedApplicableRegs, driftBannerHTML } from '/js/posture.js?v=47';
    import { INTAKE_SAMPLES, sampleBannerHTML } from '/js/samples.js?v=47';

    const { user, memberships, company, member } = await requireCompany();
    renderHeader({ user, company, memberships });
    renderFooter();

    const editorOK = canEdit(member);
    const adminOK = canAdmin(member);
    if (!editorOK) document.querySelectorAll('[data-editor-only]').forEach(el => el.setAttribute('disabled', 'disabled'));

    // Load posture once; use it to decide which conditional blocks to render
    // and to snapshot applicable regs onto each record at save-time.
    const posture = await getPosture(company.id);
    const intakeExtras = derivedIntakeExtras(posture);
    const applicableRegs = derivedApplicableRegs(posture);

    const statusFilter = document.querySelector('[data-filter-status]');
    statusFilter.addEventListener('change', refresh);

    async function refresh() {
      const rows = await listDocs(company.id, 'intake', { orderBy: [['createdAt', 'desc']] });
      const filterVal = statusFilter.value;
      const filtered = filterVal ? rows.filter(r => r.status === filterVal) : rows;

      const tbody = document.querySelector('[data-intake-rows]');
      const bannerMount = document.querySelector('[data-sample-banner]');
      if (bannerMount) bannerMount.innerHTML = '';

      let display = filtered;
      let showingSamples = false;
      if (rows.length === 0 && !filterVal) {
        display = INTAKE_SAMPLES;
        showingSamples = true;
        if (bannerMount) bannerMount.innerHTML = sampleBannerHTML('intake requests');
      }

      if (display.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" class="empty-state">No intake requests${filterVal ? ' with that status' : ' yet'}.</td></tr>`;
        return;
      }

      tbody.innerHTML = display.map(r => {
        const titleCell = r.isSample
          ? escapeHTML(r.title || '(untitled)')
          : `<a href="#" data-open="${escapeHTML(r.id)}">${escapeHTML(r.title || '(untitled)')}</a>`;
        return `
          <tr${r.isSample ? ' data-sample="1"' : ''}>
            <td>${titleCell}</td>
            <td>${escapeHTML(r.requesterName || '')}</td>
            <td>${escapeHTML(r.department || '')}</td>
            <td>${formatDate(r.createdAt)}</td>
            <td><span class="status-pill status-${escapeHTML((r.status || 'submitted'))}">${escapeHTML(r.status || 'submitted')}</span></td>
            <td>
              ${editorOK && !r.isSample ? `<button class="btn btn-ghost btn-sm" data-open="${escapeHTML(r.id)}">Open</button>` : ''}
            </td>
          </tr>
        `;
      }).join('');

      if (!showingSamples) {
        tbody.querySelectorAll('[data-open]').forEach(el => {
          el.addEventListener('click', async (e) => {
            e.preventDefault();
            const id = e.currentTarget.dataset.open;
            const rec = await getRecord(company.id, 'intake', id);
            openIntakeEditor(rec);
          });
        });
      }
    }
    refresh();

    document.querySelector('[data-new-intake]').addEventListener('click', () => {
      if (!editorOK) return;
      openIntakeEditor(null);
    });

    // ---------- posture-driven extras ----------
    // Each block renders only if the company's framework posture triggered it.
    // A small banner explains *why* the block is showing so the connection to
    // the Regulatory Posture Worksheet stays visible.

    function extraHeader(title, reason) {
      return `
        <div class="intake-extra-header">
          <h3>${escapeHTML(title)}</h3>
          <span class="intake-extra-reason">${escapeHTML(reason)}</span>
        </div>
      `;
    }

    function phiBlockHTML(v) {
      return `
        <section class="intake-extra" data-extra="phi">
          ${extraHeader('Healthcare / HIPAA', 'Shown because your framework posture includes Healthcare/HIPAA.')}
          <div class="field">
            <label>Does this system create, receive, maintain, or transmit PHI?</label>
            <select name="phiInvolved">
              <option value="">—</option>
              <option ${v.phiInvolved==='yes'?'selected':''} value="yes">Yes</option>
              <option ${v.phiInvolved==='no'?'selected':''} value="no">No</option>
              <option ${v.phiInvolved==='unsure'?'selected':''} value="unsure">Unsure</option>
            </select>
          </div>
          <div class="field">
            <label>Minimum-necessary PHI fields</label>
            <textarea name="phiFields" rows="2" placeholder="List the specific PHI fields accessed">${escapeHTML(v.phiFields || '')}</textarea>
          </div>
          <div class="field">
            <label>Vendor BAA required?</label>
            <select name="phiBaaRequired">
              <option value="">—</option>
              <option ${v.phiBaaRequired==='onfile'?'selected':''} value="onfile">Yes — BAA on file</option>
              <option ${v.phiBaaRequired==='pending'?'selected':''} value="pending">Yes — BAA pending</option>
              <option ${v.phiBaaRequired==='na'?'selected':''} value="na">Not applicable</option>
            </select>
          </div>
        </section>
      `;
    }

    function studentDataBlockHTML(v) {
      return `
        <section class="intake-extra" data-extra="studentData">
          ${extraHeader('Education / FERPA', 'Shown because your framework posture includes Education/FERPA.')}
          <div class="field">
            <label>Does this system access or derive student education records?</label>
            <select name="studentRecordsTouched">
              <option value="">—</option>
              <option ${v.studentRecordsTouched==='pii'?'selected':''} value="pii">Yes — PII records</option>
              <option ${v.studentRecordsTouched==='directory'?'selected':''} value="directory">Directory-info only</option>
              <option ${v.studentRecordsTouched==='no'?'selected':''} value="no">No</option>
            </select>
          </div>
          <div class="field">
            <label>Parent / eligible-student consent mechanism</label>
            <textarea name="ferpaConsent" rows="2">${escapeHTML(v.ferpaConsent || '')}</textarea>
          </div>
        </section>
      `;
    }

    function coppaBlockHTML(v) {
      return `
        <section class="intake-extra" data-extra="coppa">
          ${extraHeader('Children under 13 (COPPA)', 'Shown because your posture includes "Processes children\'s data".')}
          <div class="field">
            <label>Will users under 13 access or be profiled by this system?</label>
            <select name="under13">
              <option value="">—</option>
              <option ${v.under13==='yes'?'selected':''} value="yes">Yes</option>
              <option ${v.under13==='no'?'selected':''} value="no">No</option>
            </select>
          </div>
          <div class="field">
            <label>Verifiable parental consent method</label>
            <textarea name="coppaConsent" rows="2" placeholder="e.g., credit-card auth, signed form, knowledge-based auth">${escapeHTML(v.coppaConsent || '')}</textarea>
          </div>
        </section>
      `;
    }

    function biometricBlockHTML(v) {
      return `
        <section class="intake-extra" data-extra="biometric">
          ${extraHeader('Biometrics', 'Shown because your posture includes "Processes biometrics".')}
          <div class="field">
            <label>Biometric identifier types collected</label>
            <input name="biometricTypes" value="${escapeHTML(v.biometricTypes || '')}" placeholder="e.g., fingerprint, voiceprint, face, gait" />
          </div>
          <div class="field">
            <label>Retention period</label>
            <input name="biometricRetention" value="${escapeHTML(v.biometricRetention || '')}" placeholder="e.g., purpose-fulfilled or 1 year post-termination (BIPA cap: 3y)" />
          </div>
          <div class="field">
            <label>Written consent mechanism (BIPA / CPRA)</label>
            <textarea name="biometricConsent" rows="2">${escapeHTML(v.biometricConsent || '')}</textarea>
          </div>
        </section>
      `;
    }

    function employmentBlockHTML(v) {
      return `
        <section class="intake-extra" data-extra="employmentDecision">
          ${extraHeader('Employment decisions (EEOC)', 'Shown because your posture includes Employment/EEOC.')}
          <div class="field">
            <label>Does this system make or assist employment decisions?</label>
            <select name="employmentDecision">
              <option value="">—</option>
              <option ${v.employmentDecision==='yes'?'selected':''} value="yes">Yes</option>
              <option ${v.employmentDecision==='no'?'selected':''} value="no">No</option>
            </select>
          </div>
          <div class="field">
            <label>Decision scope</label>
            <div class="checkbox-grid">
              <label><input type="checkbox" name="employmentScope" data-multiple value="hiring" /> Hiring / screening</label>
              <label><input type="checkbox" name="employmentScope" data-multiple value="pay" /> Pay / promotion</label>
              <label><input type="checkbox" name="employmentScope" data-multiple value="termination" /> Discipline / termination</label>
              <label><input type="checkbox" name="employmentScope" data-multiple value="monitoring" /> Productivity / surveillance</label>
            </div>
          </div>
        </section>
      `;
    }

    function soxBlockHTML(v) {
      return `
        <section class="intake-extra" data-extra="sox">
          ${extraHeader('Material financial processes (SOX)', 'Shown because your posture includes Public Company/SOX.')}
          <div class="field">
            <label>Does this system support a material financial process?</label>
            <select name="soxMaterial">
              <option value="">—</option>
              <option ${v.soxMaterial==='yes'?'selected':''} value="yes">Yes</option>
              <option ${v.soxMaterial==='no'?'selected':''} value="no">No</option>
              <option ${v.soxMaterial==='assessing'?'selected':''} value="assessing">Assessing</option>
            </select>
          </div>
          <div class="field">
            <label>ICFR control ID (if applicable)</label>
            <input name="soxIcfrControlId" value="${escapeHTML(v.soxIcfrControlId || '')}" />
          </div>
        </section>
      `;
    }

    function publicSectorBlockHTML(v) {
      return `
        <section class="intake-extra" data-extra="publicSector">
          ${extraHeader('Public sector / procurement', 'Shown because your posture includes Government.')}
          <div class="field">
            <label>Procurement vehicle / contract ID</label>
            <input name="procContractId" value="${escapeHTML(v.procContractId || '')}" />
          </div>
          <div class="field">
            <label>Federal AI use-case inventory entry (OMB M-24-10)</label>
            <input name="m2410InventoryRef" value="${escapeHTML(v.m2410InventoryRef || '')}" placeholder="agency inventory ID, if federal" />
          </div>
        </section>
      `;
    }

    function extrasBlocksHTML(v) {
      return [
        intakeExtras.includes('phi') ? phiBlockHTML(v) : '',
        intakeExtras.includes('studentData') ? studentDataBlockHTML(v) : '',
        intakeExtras.includes('coppa') ? coppaBlockHTML(v) : '',
        intakeExtras.includes('biometric') ? biometricBlockHTML(v) : '',
        intakeExtras.includes('employmentDecision') ? employmentBlockHTML(v) : '',
        intakeExtras.includes('sox') ? soxBlockHTML(v) : '',
        intakeExtras.includes('publicSector') ? publicSectorBlockHTML(v) : ''
      ].join('');
    }

    function intakeFormHTML(values = {}) {
      return `
        ${driftBannerHTML(values.applicableRegsSnapshot, applicableRegs)}
        <div class="field">
          <label>Title *</label>
          <input name="title" required value="${escapeHTML(values.title || '')}" />
        </div>
        <div class="grid-2">
          <div class="field">
            <label>Requester name</label>
            <input name="requesterName" value="${escapeHTML(values.requesterName || user.displayName || '')}" />
          </div>
          <div class="field">
            <label>Department</label>
            <input name="department" value="${escapeHTML(values.department || '')}" />
          </div>
        </div>
        <div class="field">
          <label>Business problem / opportunity *</label>
          <textarea name="problem" rows="3" required>${escapeHTML(values.problem || '')}</textarea>
        </div>
        <div class="field">
          <label>Proposed AI approach *</label>
          <textarea name="approach" rows="3" required placeholder="e.g., GPT-based summarization of case notes; in-house classifier on tabular data; vendor LLM feature">${escapeHTML(values.approach || '')}</textarea>
        </div>
        <div class="field">
          <label>Build / Buy / Enable</label>
          <select name="sourcing">
            <option value="">—</option>
            <option ${values.sourcing==='build'?'selected':''} value="build">Build — in-house</option>
            <option ${values.sourcing==='buy'?'selected':''} value="buy">Buy — dedicated AI product</option>
            <option ${values.sourcing==='enable'?'selected':''} value="enable">Enable — AI feature inside existing product</option>
          </select>
        </div>
        <div class="grid-2">
          <div class="field">
            <label>Data types involved</label>
            <textarea name="dataTypes" rows="2" placeholder="e.g., PII, PHI, student records, financial data, biometric…">${escapeHTML(values.dataTypes || '')}</textarea>
          </div>
          <div class="field">
            <label>Users / populations affected</label>
            <textarea name="affected" rows="2" placeholder="e.g., internal analysts only; 12k customers; K–12 students">${escapeHTML(values.affected || '')}</textarea>
          </div>
        </div>
        <div class="field">
          <label>Decisions this system influences</label>
          <textarea name="decisions" rows="2" placeholder="e.g., hiring, credit, admission, diagnosis, routing, eligibility">${escapeHTML(values.decisions || '')}</textarea>
        </div>
        ${extrasBlocksHTML(values)}
        <div class="field">
          <label>Expected benefits / success metrics</label>
          <textarea name="benefits" rows="2">${escapeHTML(values.benefits || '')}</textarea>
        </div>
        <div class="field">
          <label>Known concerns / constraints</label>
          <textarea name="concerns" rows="2" placeholder="e.g., legal review needed; vendor contract pending; customer-facing outputs">${escapeHTML(values.concerns || '')}</textarea>
        </div>
        <div class="grid-2">
          <div class="field">
            <label>Target launch date</label>
            <input name="targetDate" type="date" value="${escapeHTML(values.targetDate || '')}" />
          </div>
          <div class="field">
            <label>Estimated annual cost</label>
            <input name="estCost" value="${escapeHTML(values.estCost || '')}" placeholder="e.g., $25,000" />
          </div>
        </div>
        <div class="field">
          <label>Status</label>
          <select name="status" ${adminOK?'':'disabled'}>
            ${['submitted','triage','review','approved','rejected','withdrawn'].map(s =>
              `<option ${((values.status || 'submitted')===s)?'selected':''} value="${s}">${s}</option>`
            ).join('')}
          </select>
        </div>
        <div class="field">
          <label>Governance notes (internal)</label>
          <textarea name="govNotes" rows="3">${escapeHTML(values.govNotes || '')}</textarea>
        </div>
      `;
    }

    function openIntakeEditor(rec) {
      const isNew = !rec;
      const form = document.createElement('form');
      form.className = 'stacked-form';
      form.innerHTML = intakeFormHTML(rec || {});

      // Restore multi-checkbox state on the employmentDecision block,
      // which isn't covered by inline value substitution.
      if (intakeExtras.includes('employmentDecision')) {
        const scopeVals = rec?.employmentScope || [];
        form.querySelectorAll('input[name="employmentScope"]').forEach(cb => {
          cb.checked = scopeVals.includes(cb.value);
        });
      }

      const actions = [
        { label: 'Close', variant: 'ghost', onClick: ({ close }) => close() }
      ];
      if (editorOK) {
        actions.push({
          label: isNew ? 'Submit' : 'Save',
          variant: 'primary',
          onClick: async ({ close }) => {
            if (!form.reportValidity()) return;
            const data = serializeForm(form);
            // Snapshot applicable regs at the moment of save so historical
            // records stay truthful even if posture changes later.
            data.applicableRegsSnapshot = applicableRegs;
            try {
              if (isNew) {
                const id = await createRecord(company.id, 'intake', {
                  ...data,
                  status: data.status || 'submitted'
                }, user.uid);
                await logEvent(company.id, { actorUid: user.uid, actorName: user.displayName || user.email, action: 'intake.create', target: id, details: { title: data.title } });
                toast('Intake request submitted.', 'success');
              } else {
                await updateRecord(company.id, 'intake', rec.id, data, user.uid);
                await logEvent(company.id, { actorUid: user.uid, actorName: user.displayName || user.email, action: 'intake.update', target: rec.id, details: { status: data.status } });
                toast('Saved.', 'success');
              }
              close();
              refresh();
            } catch (err) {
              toast(err.message, 'error', 5000);
            }
          }
        });
      }
      if (!isNew && adminOK) {
        actions.unshift({
          label: 'Delete',
          variant: 'danger',
          onClick: async ({ close }) => {
            const ok = await confirmDialog({ title: 'Delete this intake?', message: 'This cannot be undone.', confirmLabel: 'Delete', variant: 'danger' });
            if (!ok) return;
            try {
              await deleteRecord(company.id, 'intake', rec.id);
              await logEvent(company.id, { actorUid: user.uid, actorName: user.displayName || user.email, action: 'intake.delete', target: rec.id });
              toast('Deleted.', 'success');
              close();
              refresh();
            } catch (err) {
              toast(err.message, 'error', 5000);
            }
          }
        });
      }

      openModal({
        title: isNew ? 'New intake request' : `Intake: ${rec.title || '(untitled)'}`,
        body: form,
        actions
      });
    }
  </script>

</body>
</html>
